# Route API — built with Dockerfile on Fly's remote builder (no local Docker needed).
# From repo root:
#   fly deploy --remote-only
#
# Set secrets:
#   fly secrets set CORS_ORIGINS="https://<user>.github.io"

app = "p6geneme-route-api"
primary_region = "arn"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "10s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
