# Deploy the route API to Fly.io (Dockerfile at repo root).
# Graph data lives on the Fly volume (/data), not in the image — no ETAK pipeline here.
#
# Required repository secret: FLY_API_TOKEN
#   Create locally: fly tokens create deploy -x 999999h
#   Or: https://fly.io/dashboard/personal/tokens

name: Deploy Fly API

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - ".github/workflows/fly-deploy.yml"
      - "fly.toml"
      - "Dockerfile"
      - ".dockerignore"
      - "package.json"
      - "yarn.lock"
      - "tsconfig.base.json"
      - "route-calculator/**"

concurrency:
  group: fly-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Deploy to Fly
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
