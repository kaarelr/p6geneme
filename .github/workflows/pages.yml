name: Deploy GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/pages.yml"
      - "trail-map/**"
      - "route-calculator/**"
      - "package.json"
      - "yarn.lock"
      - "tsconfig.base.json"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: yarn

      - name: Enable Yarn (Corepack)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Cache ETAK data + computed route artifacts
        id: etak-cache
        uses: actions/cache@v4
        with:
          path: |
            route-calculator/data
            route-calculator/public/route.geojson
            route-calculator/public/route.gpx
          # v3: hash everything that affects download/graph/compute (excludes src/web, src/server for web-only cache hits)
          key: etak-data-v3-${{ hashFiles('route-calculator/scripts/download-etak.ts', 'route-calculator/scripts/build-graph.ts', 'route-calculator/scripts/compute-route.ts', 'route-calculator/src/config.ts', 'route-calculator/src/etak/**/*.ts', 'route-calculator/src/geo/**/*.ts', 'route-calculator/src/graph/**/*.ts', 'route-calculator/src/gpx/**/*.ts', 'route-calculator/src/route/**/*.ts', 'yarn.lock') }}

      - name: Download ETAK, build graph, compute route
        if: steps.etak-cache.outputs.cache-hit != 'true'
        env:
          # Optional repo secret: EPSG:3301 bbox "minX,minY,maxX,maxY" — limits WFS fetch (faster CI than all Estonia).
          ETAK_BBOX: ${{ secrets.ETAK_BBOX }}
        run: |
          yarn workspace route-calculator etak:download
          yarn workspace route-calculator etak:graph
          yarn workspace route-calculator route:compute

      - name: Build route-calculator
        env:
          CI: "true"
          # Optional: overrides hardcoded default in client when set (e.g. staging API).
          VITE_API_URL: ${{ secrets.ROUTE_API_URL }}
        run: yarn workspace route-calculator build

      - name: Assemble site
        run: |
          mkdir -p _site/trail-map _site/route-calculator
          cp -R trail-map/. _site/trail-map/
          cp -R route-calculator/dist/web/. _site/route-calculator/
          cat > _site/index.html <<'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>p6geneme</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 40rem; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; }
              a { color: #1a5f4a; }
            </style>
          </head>
          <body>
            <h1>p6geneme</h1>
            <ul>
              <li><a href="trail-map/">Trail map (PWA)</a></li>
              <li><a href="route-calculator/">Route calculator</a></li>
            </ul>
          </body>
          </html>
          HTML

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
