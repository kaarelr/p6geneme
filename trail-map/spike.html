<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Maa-amet tile spike</title>
  <link rel="stylesheet" href="./vendor/leaflet.css" />
  <style>html,body,#map{height:100%;margin:0}</style>
</head>
<body>
  <div id="map"></div>
  <script src="./vendor/leaflet.js"></script>
  <script>
    const TMS = 'https://tiles.maaamet.ee/tm/tms/1.0.0/kaart@GMC/{z}/{x}/{y}.png';
    const map = L.map('map').setView([58.6, 25.0], 7);
    L.tileLayer(TMS, {
      tms: true,
      maxZoom: 18,
      attribution: '&copy; <a href="https://www.maaamet.ee/">Maa-amet</a>',
    }).addTo(map);
  </script>
</body>
</html>
